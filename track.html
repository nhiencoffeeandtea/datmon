<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Theo dõi đơn hàng — Nhiên Coffee and Tea</title>
<style>
  :root{
    --color-bg: #F6F3EC;
    --color-surface: #FFFFFF;
    --color-primary: #2D4A1E;
    --color-primary-light: #E7EEE0;
    --color-text: #26301F;
    --color-text-muted: #6b7263;
    --color-border: #E2DFD3;
    --font-heading: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);padding-bottom:40px;}
  header{padding:26px 20px 10px;text-align:center;}
  header h1{font-family:var(--font-heading);color:var(--color-primary);margin:0 0 4px;font-size:22px;}
  header p{margin:0;color:var(--color-text-muted);font-size:13px;}

  .wrap{max-width:480px;margin:0 auto;padding:0 16px;}
  .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);padding:20px;margin-top:16px;}

  .order-code{font-size:13px;color:var(--color-text-muted);margin:0 0 2px;}
  .order-code b{color:var(--color-text);font-size:15px;}

  .stepper{margin:18px 0;position:relative;padding-left:30px;}
  .stepper::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--color-primary-light);}
  .step{position:relative;margin-bottom:20px;}
  .step:last-child{margin-bottom:0;}
  .step .dot{position:absolute;left:-30px;top:0;width:20px;height:20px;border-radius:50%;background:var(--color-border);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}
  .step.done .dot, .step.active .dot{background:var(--color-primary);}
  .step .title{font-size:14px;font-weight:600;color:var(--color-text-muted);margin:0;}
  .step.done .title, .step.active .title{color:var(--color-text);}
  .step .sub{font-size:12.5px;color:var(--color-text-muted);margin:2px 0 0;}

  .items{border-top:1px solid var(--color-border);padding-top:12px;margin-top:4px;}
  .item-row{display:flex;justify-content:space-between;font-size:13.5px;color:var(--color-text-muted);margin-bottom:6px;}
  .grand{display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--color-text);padding-top:10px;border-top:1px solid var(--color-border);margin-top:6px;}

  .contact{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--color-primary-light);font-size:13px;text-align:center;}
  .contact a{color:var(--color-primary);font-weight:700;text-decoration:none;}

  .state-msg{text-align:center;padding:40px 16px;color:var(--color-text-muted);font-size:14px;}
  .hidden{display:none;}
</style>
</head>
<body>

<header>
  <h1>Nhiên Coffee and Tea</h1>
  <p>Theo dõi đơn hàng</p>
</header>

<div class="wrap">
  <div id="loadingState" class="state-msg">Đang tải thông tin đơn hàng...</div>

  <div id="notFoundState" class="state-msg hidden">
    Không tìm thấy đơn hàng này.<br>Vui lòng kiểm tra lại link, hoặc liên hệ trực tiếp <a href="tel:0938519928" style="color:var(--color-primary);font-weight:700;">0938 519 928</a>.
  </div>

  <div id="orderState" class="hidden">
    <div class="card">
      <p class="order-code">Mã đơn<br><b id="orderCodeText"></b></p>

      <div class="stepper" id="stepper">
        <div class="step done" id="step1">
          <span class="dot">✓</span>
          <p class="title">Đã nhận đơn</p>
        </div>
        <div class="step" id="step2">
          <span class="dot">☕</span>
          <p class="title">Đang pha chế</p>
        </div>
        <div class="step" id="step3">
          <span class="dot">🛵</span>
          <p class="title" id="step3Title">Đang giao</p>
        </div>
        <div class="step" id="step4">
          <span class="dot">✓</span>
          <p class="title">Hoàn thành</p>
          <p class="sub">Đang chờ cập nhật</p>
        </div>
      </div>

      <div class="items" id="itemsList"></div>
    </div>

    <div class="contact">
      Cần liên hệ gấp? Gọi <a href="tel:0938519928">0938 519 928</a>
    </div>
  </div>
</div>

<script>
const GOOGLE_SHEET_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzho1yEhcv73KMl0GVPttB-ZLonrY92CMWihx5leDuhmKhvGklMb1Wb2PQfTa5EsUYD/exec';
const REFRESH_MS = 15000;

// Tên món theo MenuID - khớp với danh sách món trên trang đặt hàng, chỉ để hiển thị.
const MENU_NAMES = {
  1:"Trà chanh xí muội", 2:"Trà mận", 3:"Trà đào", 4:"Trà cam xí muội",
  5:"Trà xoài chanh leo", 6:"Trà chanh leo", 7:"Trà me muối ớt", 8:"Trà sốt tắc",
  9:"Trà tắc xí muội", 10:"Trà thơm", 11:"Cà phê đen đá", 12:"Cà phê sữa đá",
  13:"Bạc sĩu đá", 14:"Cà phê caramel", 15:"Cà phê muối", 16:"Cà phê thạch sương sáo",
  17:"Phindi đậu phộng", 18:"Phindi hạnh nhân", 19:"Cà phê dẻo Buôn Mê",
  20:"Milo dầm", 21:"Sữa tươi hạt đác", 22:"Cacao latte muối", 23:"Cacao pudding", 24:"Cacao latte"
};

function getOrderCode(){
  const params = new URLSearchParams(window.location.search);
  return params.get('code') || params.get('ma') || '';
}

async function fetchOrder(){
  const code = getOrderCode();
  if(!code){
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('notFoundState').classList.remove('hidden');
    return;
  }
  try{
    const res = await fetch(GOOGLE_SHEET_WEBHOOK_URL + '?action=track&code=' + encodeURIComponent(code) + '&_=' + Date.now());
    const data = await res.json();
    document.getElementById('loadingState').classList.add('hidden');
    if(!data.ok){
      document.getElementById('notFoundState').classList.remove('hidden');
      document.getElementById('orderState').classList.add('hidden');
      return;
    }
    document.getElementById('notFoundState').classList.add('hidden');
    document.getElementById('orderState').classList.remove('hidden');
    renderOrder(data);
  }catch(err){
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('notFoundState').classList.remove('hidden');
  }
}

function renderOrder(o){
  document.getElementById('orderCodeText').textContent = o.orderCode;

  const done = o.status === 'HOÀN THÀNH';
  document.getElementById('step3Title').textContent = o.isPickup ? 'Đang chờ lấy' : 'Đang giao';
  document.getElementById('step2').className = 'step ' + (done ? 'done' : 'active');
  document.getElementById('step3').className = 'step ' + (done ? 'active' : '');

  const itemsHtml = (o.items || []).map(it => {
    const name = MENU_NAMES[it.menuId] || it.itemId;
    return `<div class="item-row"><span>${name} (${it.size}) x${it.qty}</span><span>${it.lineTotal.toLocaleString('vi-VN')}đ</span></div>`;
  }).join('');
  document.getElementById('itemsList').innerHTML = itemsHtml +
    `<div class="grand"><span>Tổng cộng</span><span>${o.totalBill.toLocaleString('vi-VN')}đ</span></div>`;
}

fetchOrder();
setInterval(fetchOrder, REFRESH_MS);
</script>
</body>
</html>
